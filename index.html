<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusBot — AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #151821; --surface2: #1c2030;
      --border: #2a2f42; --text: #e8eaf0; --muted: #7a8099; --hint: #454d6a;
      --accent: #6c8fff; --accent-bg: #1a2340; --green: #34d399; --green-bg: #0d2820;
      --amber: #fbbf24; --amber-bg: #271e08; --red: #f87171; --red-bg: #2a0f0f;
      --blue-bg: #0e1e36; --blue-text: #93c5fd;
      --fm: 'JetBrains Mono', monospace; --fu: 'Syne', sans-serif;
      --radius: 14px; --radius-sm: 8px;
    }
    html, body { height: 100%; }
    body { font-family: var(--fu); background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
    #app { width: 100%; max-width: 760px; height: 92vh; max-height: 860px; display: flex; flex-direction: column; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .topbar { display: flex; align-items: center; gap: 10px; padding: 11px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
    .logo { display: flex; align-items: center; gap: 8px; flex: 1; }
    .logo-icon { width: 28px; height: 28px; border-radius: 8px; background: var(--accent-bg); border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--accent); }
    .logo-text { font-size: 15px; font-weight: 700; color: var(--text); }
    .logo-text small { font-size: 10px; font-weight: 400; color: var(--muted); margin-left: 6px; font-family: var(--fm); }
    .pill { display: flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 99px; border: 1px solid var(--border); font-size: 11px; font-family: var(--fm); color: var(--muted); background: var(--bg); }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .modelbar { display: flex; align-items: center; gap: 6px; padding: 7px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; background: var(--surface); }
    .modelbar-label { font-size: 11px; font-family: var(--fm); color: var(--hint); }
    .mbtn { font-family: var(--fm); font-size: 11px; padding: 3px 10px; border-radius: 99px; border: 1px solid var(--border); cursor: pointer; background: var(--surface2); color: var(--muted); transition: all .15s; }
    .mbtn:hover { color: var(--text); border-color: var(--hint); }
    .mbtn.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
    .quickbar { display: flex; gap: 6px; padding: 8px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; background: var(--surface2); }
    .qb { font-family: var(--fu); font-size: 11px; font-weight: 500; padding: 5px 12px; border-radius: 99px; border: 1px solid var(--border); cursor: pointer; background: var(--surface); color: var(--muted); transition: all .15s; }
    .qb:hover { color: var(--text); border-color: var(--hint); }
    .qb:disabled { opacity: .35; cursor: not-allowed; }
    .xprow { padding: 5px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface2); }
    .xplabels { display: flex; justify-content: space-between; font-family: var(--fm); font-size: 10px; color: var(--hint); margin-bottom: 4px; }
    .xptrack { height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .xpfill { height: 100%; background: var(--amber); border-radius: 99px; transition: width .4s ease; }
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    .msg { display: flex; flex-direction: column; gap: 3px; max-width: 82%; }
    .mu { align-self: flex-end; align-items: flex-end; }
    .mb { align-self: flex-start; align-items: flex-start; }
    .mlabel { font-family: var(--fm); font-size: 10px; color: var(--hint); padding: 0 4px; }
    .bubble { padding: 9px 13px; border-radius: var(--radius-sm); font-size: 13.5px; line-height: 1.6; border: 1px solid var(--border); background: var(--surface2); color: var(--text); white-space: pre-wrap; word-break: break-word; }
    .mu .bubble { background: var(--accent-bg); color: var(--accent); border-color: transparent; }
    .sys .bubble { background: var(--green-bg); color: var(--green); border-color: transparent; font-family: var(--fm); font-size: 12px; }
    .fact .bubble { background: var(--green-bg); color: var(--green); border-color: transparent; }
    .news .bubble { background: var(--blue-bg); color: var(--blue-text); border-color: transparent; }
    .reward .bubble { background: var(--amber-bg); color: var(--amber); border-color: transparent; font-family: var(--fm); font-size: 12px; }
    .err .bubble { background: var(--red-bg); color: var(--red); border-color: transparent; font-family: var(--fm); font-size: 12px; }
    .typedots { display: flex; gap: 5px; padding: 11px 13px; }
    .typedots span { width: 6px; height: 6px; background: var(--hint); border-radius: 50%; animation: bonce 1.2s infinite; }
    .typedots span:nth-child(2) { animation-delay: .2s; }
    .typedots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bonce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    .langrow { padding: 6px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface2); }
    .langinner { display: flex; align-items: center; gap: 8px; }
    .langlabel { font-size: 11px; font-family: var(--fm); color: var(--hint); flex-shrink: 0; }
    .langwrap { position: relative; flex: 1; }
    .langinput { width: 100%; font-family: var(--fm); font-size: 11px; padding: 4px 10px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
    .langdrop { display: none; position: absolute; bottom: 110%; left: 0; right: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); max-height: 180px; overflow-y: auto; z-index: 100; scrollbar-width: thin; }
    .langitem { padding: 7px 12px; cursor: pointer; font-size: 12px; font-family: var(--fm); color: var(--text); display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--border); }
    .langitem:hover { background: var(--surface); }
    .langitem span:last-child { color: var(--hint); font-size: 10px; }
    .langsel { font-size: 11px; font-family: var(--fm); color: var(--accent); min-width: 60px; flex-shrink: 0; }
    .resetbtn { font-size: 10px; font-family: var(--fm); padding: 3px 8px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; flex-shrink: 0; }
    .resetbtn:hover { color: var(--text); }
    .inputbar { display: flex; gap: 8px; padding: 11px 16px; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--surface2); align-items: flex-end; }
    .inputbar textarea { flex: 1; font-family: var(--fu); font-size: 13.5px; padding: 8px 13px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg); color: var(--text); resize: none; min-height: 38px; max-height: 100px; line-height: 1.45; outline: none; }
    .inputbar textarea:focus { border-color: var(--hint); }
    .inputbar textarea::placeholder { color: var(--hint); }
    .sendbtn { padding: 8px 18px; height: 38px; border-radius: var(--radius-sm); border: 1px solid var(--accent); background: var(--accent-bg); color: var(--accent); font-family: var(--fu); font-size: 13px; font-weight: 600; cursor: pointer; flex-shrink: 0; transition: all .15s; }
    .sendbtn:hover { background: var(--accent); color: var(--bg); }
    .sendbtn:disabled { opacity: .35; cursor: not-allowed; }
    .lvtoast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: #7c3aed; color: #fff; font-family: var(--fu); font-size: 13px; font-weight: 700; padding: 8px 20px; border-radius: 99px; animation: fadeup 2.8s forwards; pointer-events: none; z-index: 999; white-space: nowrap; }
    @keyframes fadeup { 0% { opacity:1; top:24px; } 70% { opacity:1; top:18px; } 100% { opacity:0; top:8px; } }
    @media (max-width: 520px) { body { padding: 0; } #app { height: 100vh; max-height: 100vh; border-radius: 0; border: none; } }
  </style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">NexusBot <small>Groq Free API</small></div>
    </div>
    <div class="pill"><div class="dot" style="background:#fbbf24"></div><span id="xplb">0 XP</span></div>
    <div class="pill"><div class="dot" style="background:#a78bfa"></div><span id="lvlb">Lv.1</span></div>
    <div class="pill"><div class="dot" style="background:#f87171"></div><span id="stlb">0 streak</span></div>
    <div class="pill"><div class="dot" style="background:#34d399" id="liveDot"></div><span id="liveLbl">online</span></div>
  </div>
  <div class="modelbar">
    <span class="modelbar-label">Model:</span>
    <button class="mbtn active" onclick="setModel('llama-3.3-70b-versatile',this)">Llama 3.3 70B</button>
    <button class="mbtn" onclick="setModel('llama-3.1-8b-instant',this)">Llama 3.1 8B</button>
    <button class="mbtn" onclick="setModel('meta-llama/llama-4-scout-17b-16e-instruct',this)">Llama 4 Scout</button>
    <button class="mbtn" onclick="setModel('llama-3.2-11b-vision-preview',this)">Llama 3.2 11B</button>
  </div>
  <div class="quickbar">
    <button class="qb" id="btnFact" onclick="doFact()">★ Daily Fact</button>
    <button class="qb" id="btnNews" onclick="doNews()">◆ News Digest</button>
    <button class="qb" onclick="doQuick('What are all the things you can help me with?')">? Help</button>
    <button class="qb" onclick="doQuick('Give me a powerful motivational quote with explanation')">✦ Motivate</button>
    <button class="qb" onclick="doQuick('Share a mind-blowing science or history fact most people never heard of')">◉ Surprise</button>
    <button class="qb" onclick="doQuick('Give me 3 productivity tips I can use right now')">⚡ Tips</button>
  </div>
  <div class="xprow">
    <div class="xplabels"><span>XP — Level <span id="lvnum">1</span></span><span id="xpval">0 / 100</span></div>
    <div class="xptrack"><div class="xpfill" id="xpfill" style="width:0%"></div></div>
  </div>
  <div class="langrow">
    <div class="langinner">
      <span class="langlabel">🌍 Language:</span>
      <div class="langwrap">
        <input class="langinput" id="langSearch" type="text"
          placeholder="Search language... | हिंदी | தமிழ் | తెలుగు"
          oninput="filterLangs(this.value)"
          onfocus="showLangDropdown()" />
        <div class="langdrop" id="langDrop"></div>
      </div>
      <span class="langsel" id="langSel">Auto</span>
      <button class="resetbtn" onclick="resetLang()">Reset</button>
    </div>
  </div>
  <div class="messages" id="msgs"></div>
  <div class="inputbar">
    <textarea id="inp" rows="1"
      placeholder="Ask anything... | हिंदी | தமிழ் | తెలుగు | বাংলা"
      onkeydown="onKey(event)"
      oninput="rsz(this)"></textarea>
    <button class="sendbtn" id="sbtn" onclick="send()">Send →</button>
  </div>
</div>
<script>
const API_ENDPOINT='/api/chat';
const LANGUAGES=[
  {name:'Auto Detect',native:'🌍 Auto',code:'auto'},
  {name:'Hindi',native:'हिंदी',code:'hindi'},
  {name:'English',native:'English',code:'english'},
  {name:'Marathi',native:'मराठी',code:'marathi'},
  {name:'Bengali',native:'বাংলা',code:'bengali'},
  {name:'Tamil',native:'தமிழ்',code:'tamil'},
  {name:'Telugu',native:'తెలుగు',code:'telugu'},
  {name:'Kannada',native:'ಕನ್ನಡ',code:'kannada'},
  {name:'Malayalam',native:'മലയാളം',code:'malayalam'},
  {name:'Gujarati',native:'ગુજરાતી',code:'gujarati'},
  {name:'Punjabi',native:'ਪੰਜਾਬੀ',code:'punjabi'},
  {name:'Odia',native:'ଓଡ଼ିଆ',code:'odia'},
  {name:'Assamese',native:'অসমীয়া',code:'assamese'},
  {name:'Maithili',native:'मैथिली',code:'maithili'},
  {name:'Sanskrit',native:'संस्कृत',code:'sanskrit'},
  {name:'Urdu',native:'اردو',code:'urdu'},
  {name:'Sindhi',native:'सिंधी',code:'sindhi'},
  {name:'Kashmiri',native:'कश्मीरी',code:'kashmiri'},
  {name:'Nepali',native:'नेपाली',code:'nepali'},
  {name:'Konkani',native:'कोंकणी',code:'konkani'},
  {name:'Dogri',native:'डोगरी',code:'dogri'},
  {name:'Bodo',native:'बोडो',code:'bodo'},
  {name:'Santhali',native:'संथाली',code:'santhali'},
  {name:'Manipuri',native:'মণিপুরী',code:'manipuri'},
  {name:'Spanish',native:'Español',code:'spanish'},
  {name:'French',native:'Français',code:'french'},
  {name:'Arabic',native:'العربية',code:'arabic'},
  {name:'Chinese',native:'中文',code:'chinese'},
  {name:'Japanese',native:'日本語',code:'japanese'},
];
const BAD_WORDS=['stupid','idiot','fool','shut up','hate','ugly','dumb','useless','bc','mc','bsdk','chutiya','madarchod','bhenchod','gandu','harami','sala','saala','randi','gaandu'];
const LIVE_KEYWORDS=['score','live','result','match','ipl','cricket','wicket','run','pbks','mi','csk','rcb','kkr','srh','dc','rr','lsg','gt','football','fifa','goal','स्कोर','मैच','क्रिकेट','आईपीएल','रन','विकेट','রান','উইকেট','ஸ்கோர்','மேட்ச்','స్కోర్','మ్యాచ్','ಸ್ಕೋರ್','ಮ್ಯಾಚ್','സ്കോർ','മാച്ച്','સ્કોર','ਸਕੋਰ','اسکور','میچ','marcador','partido','نتيجة','مباراة','比分','比赛','スコア','試合'];
let selectedLanguage='auto',model='llama-3.3-70b-versatile',history=[],xp=0,level=1,streak=0,msgCount=0,busy=false;
const msgs=document.getElementById('msgs'),inp=document.getElementById('inp'),sbtn=document.getElementById('sbtn');

function getSystem(){
  const lang=selectedLanguage==='auto'
    ?'Always detect the language the user is writing in and reply in the SAME language automatically. Never force English.'
    :'Always reply in '+selectedLanguage+' language. Never switch languages. Reply directly without showing thinking.';
  return 'You are NexusBot — a sharp, intelligent, friendly AI assistant. Answer clearly and concisely. When a user asks a genuinely great question, begin your reply with "+XP". For facts: make them fascinating. For news: be structured and clear. For live sports scores, mention your knowledge cutoff and suggest Cricbuzz or ESPNCricinfo. IMPORTANT: '+lang;
}

window.addEventListener('load',()=>{
  addMsg('bot','NexusBot online! Powered by Groq free API.\n\nI can answer questions, share daily facts, news digests, help with tasks and research.\n\nEarn XP every message — reach Level 5 for Agent Mode!\n\nWhat would you like to explore?','sys');
  gainXP(3);streak=1;updateStats();
});

function setModel(m,btn){model=m;document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

function addMsg(role,text,type){
  const wrap=document.createElement('div');
  const tc=type||(role==='user'?'mu':'mb');
  wrap.className='msg '+tc;
  const lbl=document.createElement('div');lbl.className='mlabel';
  const labels={fact:'daily fact',news:'news digest',reward:'reward +xp',sys:'nexusbot',err:'error'};
  lbl.textContent=labels[tc]||(role==='user'?'you':'nexusbot');
  const b=document.createElement('div');b.className='bubble';b.textContent=text;
  wrap.appendChild(lbl);wrap.appendChild(b);msgs.appendChild(wrap);msgs.scrollTop=msgs.scrollHeight;return b;
}

function addTyping(){const w=document.createElement('div');w.className='msg mb';w.id='typing';const d=document.createElement('div');d.className='typedots';d.innerHTML='<span></span><span></span><span></span>';w.appendChild(d);msgs.appendChild(w);msgs.scrollTop=msgs.scrollHeight;}
function rmTyping(){const t=document.getElementById('typing');if(t)t.remove();}
function setLive(s){const dot=document.getElementById('liveDot'),lbl=document.getElementById('liveLbl');if(s==='thinking'){dot.style.background='#fbbf24';lbl.textContent='thinking...';}else if(s==='error'){dot.style.background='#f87171';lbl.textContent='error';}else{dot.style.background='#34d399';lbl.textContent='online';}}

async function callBackend(userMsg,sysPatch){
  setLive('thinking');
  const messages=[{role:'system',content:getSystem()+(sysPatch?'\n'+sysPatch:'')}, ...history, {role:'user',content:userMsg}];
  try{
    const res=await fetch(API_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages,model})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Server error');
    setLive('online');return data.reply;
  }catch(err){setLive('error');addMsg('bot','Error: '+err.message,'err');return null;}
}

async function send(){
  const text=inp.value.trim();if(!text||busy)return;
  inp.value='';rsz(inp);busy=true;sbtn.disabled=true;
  addMsg('user',text);
  const isLive=LIVE_KEYWORDS.some(k=>text.toLowerCase().includes(k));
  if(isLive){

async function doFact(){
  if(busy)return;busy=true;document.getElementById('btnFact').disabled=true;
  addMsg('user','Give me today\'s daily fact');addTyping();
  const r=await callBackend('Share one truly fascinating little-known fact. One punchy sentence first, then 2-3 sentences of context.','Be enthusiastic and educational.');
  rmTyping();if(r){addMsg('bot',r,'fact');gainXP(5);}
  busy=false;document.getElementById('btnFact').disabled=false;
}

async function doNews(){
  if(busy)return;busy=true;document.getElementById('btnNews').disabled=true;
  addMsg('user','Give me a news digest');addTyping();
  const r=await callBackend('Give a news digest with 4 sections:\n1) AI & Technology\n2) Science & Space\n3) World Affairs\n4) Business & Economy\nFor each write 2-3 sentences.','Be concise and factual.');
  rmTyping();if(r){addMsg('bot',r,'news');gainXP(5);}
  busy=false;document.getElementById('btnNews').disabled=false;
}

async function doQuick(q){if(busy)return;inp.value=q;await send();}

function gainXP(n){xp+=n;const need=level*100;if(xp>=need){xp-=need;level++;levelUp();}updateStats();}

function levelUp(){
  const t=document.createElement('div');t.className='lvtoast';t.textContent='⚡ LEVEL '+level+' UNLOCKED!';
  document.body.appendChild(t);setTimeout(()=>t.remove(),2900);
  addMsg('bot','Level '+level+' reached! '+(level>=5?'Agent Mode active!':((5-level)+' levels to Agent Mode.'))+'\n+25 bonus XP!','reward');
  gainXP(25);
}

function updateStats(){
  const need=level*100;
  document.getElementById('xplb').textContent=xp+' XP';
  document.getElementById('lvlb').textContent='Lv.'+level;
  document.getElementById('stlb').textContent=streak+' streak';
  document.getElementById('lvnum').textContent=level;
  document.getElementById('xpval').textContent=xp+' / '+need;
  document.getElementById('xpfill').style.width=Math.min(100,(xp/need)*100)+'%';
}

function showLangDropdown(){
  renderLangDrop(LANGUAGES);
  document.getElementById('langDrop').style.display='block';
  setTimeout(()=>document.addEventListener('click',closeLangDrop),10);
}
function closeLangDrop(e){
  const drop=document.getElementById('langDrop'),search=document.getElementById('langSearch');
  if(!drop.contains(e.target)&&e.target!==search){drop.style.display='none';document.removeEventListener('click',closeLangDrop);}
}
function renderLangDrop(langs){
  document.getElementById('langDrop').innerHTML=langs.map(l=>'<div class="langitem" onclick="selectLang(\''+l.code+'\',\''+l.native+'\')"><span>'+l.native+'</span><span>'+l.name+'</span></div>').join('');
}
function filterLangs(q){
  showLangDropdown();
  if(!q){renderLangDrop(LANGUAGES);return;}
  const f=LANGUAGES.filter(l=>l.name.toLowerCase().includes(q.toLowerCase())||l.native.includes(q));
  renderLangDrop(f.length?f:[{name:'Not found',native:'❌ No results',code:'auto'}]);
}
function selectLang(code,native){
  selectedLanguage=code;
  document.getElementById('langSel').textContent=native;
  document.getElementById('langSearch').value='';
  document.getElementById('langDrop').style.display='none';
  addMsg('bot',code!=='auto'?'Language set to '+native+'! I will now reply in this language 🎉':'Auto detect enabled! I will match your language automatically 🌍','sys');
}
function resetLang(){selectedLanguage='auto';document.getElementById('langSel').textContent='Auto';document.getElementById('langSearch').value='';}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function rsz(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
updateStats();
</script>
